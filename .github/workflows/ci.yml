name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: uv sync --dev
      
    - name: Run lint
      run: uv run ruff check src/ tests/
      
    - name: Run typecheck
      run: uv run mypy --strict src/
      
    - name: Run tests with coverage
      run: uv run pytest -v --cov=src/finance_mcp --cov-report=xml tests/
